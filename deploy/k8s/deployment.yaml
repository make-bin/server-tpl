apiVersion: apps/v1
kind: Deployment
metadata:
  name: server-tpl
  labels:
    app: server-tpl
spec:
  replicas: 3
  selector:
    matchLabels:
      app: server-tpl
  template:
    metadata:
      labels:
        app: server-tpl
    spec:
      containers:
      - name: server-tpl
        image: server-tpl:latest
        ports:
        - containerPort: 8080
        env:
        - name: SERVER_PORT
          value: "8080"
        - name: SERVER_HOST
          value: "0.0.0.0"
        - name: SERVER_MODE
          value: "release"
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: server-tpl-config
              key: database.host
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: server-tpl-config
              key: database.port
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: server-tpl-secret
              key: database.user
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: server-tpl-secret
              key: database.password
        - name: DATABASE_DBNAME
          valueFrom:
            configMapKeyRef:
              name: server-tpl-config
              key: database.dbname
        - name: LOG_LEVEL
          value: "info"
        - name: LOG_FORMAT
          value: "json"
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: server-tpl-service
spec:
  selector:
    app: server-tpl
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: server-tpl-config
data:
  database.host: "postgres-service"
  database.port: "5432"
  database.dbname: "server_tpl"
  database.sslmode: "disable"
---
apiVersion: v1
kind: Secret
metadata:
  name: server-tpl-secret
type: Opaque
data:
  database.user: cG9zdGdyZXM=  # postgres
  database.password: cGFzc3dvcmQ=  # password
